<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVO AI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --border: #e2e8f8;
  --shadow: rgba(99,102,241,0.10);
  --accent: #6366f1;
  --accent2: #06b6d4;
  --accent3: #f59e0b;
  --text: #1e1b4b;
  --muted: #94a3b8;
  --user-bg: #6366f1;
  --bot-bg: #f8faff;
  --green: #10b981;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(99,102,241,0.07) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(6,182,212,0.07) 0%, transparent 40%);
}

.app {
  width: 100%;
  max-width: 720px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
}

/* HEADER */
.header {
  background: var(--surface);
  border-radius: 20px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 20px var(--shadow);
  border: 1px solid var(--border);
  animation: slideDown 0.5s ease;
}

.logo {
  width: 46px; height: 46px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 12px rgba(99,102,241,0.3);
  flex-shrink: 0;
}

.header-text h1 {
  font-size: 17px; font-weight: 900;
  color: var(--text);
}

.header-text p {
  font-size: 12px; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.subjects-bar {
  display: flex; gap: 6px; overflow-x: auto;
  scrollbar-width: none; padding-bottom: 2px;
  flex-shrink: 0;
}
.subjects-bar::-webkit-scrollbar { display: none; }

.sub-chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  border: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.sub-chip:hover { transform: translateY(-1px); }
.sub-chip.active { color: white !important; border-color: transparent !important; }

.chip-math    { background: #fef3c7; color: #d97706; border-color: #fcd34d; }
.chip-math.active { background: #f59e0b; }
.chip-physics { background: #ede9fe; color: #7c3aed; border-color: #c4b5fd; }
.chip-physics.active { background: #7c3aed; }
.chip-chem    { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
.chip-chem.active { background: #10b981; }
.chip-bio     { background: #dcfce7; color: #166534; border-color: #86efac; }
.chip-bio.active { background: #22c55e; }
.chip-history { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
.chip-history.active { background: #f97316; }
.chip-lit     { background: #fce7f3; color: #9d174d; border-color: #f9a8d4; }
.chip-lit.active { background: #ec4899; }
.chip-eng     { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
.chip-eng.active { background: #0ea5e9; }
.chip-geo     { background: #ecfdf5; color: #047857; border-color: #6ee7b7; }
.chip-geo.active { background: #059669; }
.chip-it      { background: #f0fdf4; color: #15803d; border-color: #86efac; }
.chip-it.active { background: #16a34a; }
.chip-all     { background: linear-gradient(135deg,#6366f1,#06b6d4); color: white; border-color: transparent; }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 4px 2px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
.message.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; margin-top: 2px;
}
.bot .msg-avatar {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 2px 8px rgba(99,102,241,0.25);
}
.user .msg-avatar {
  background: var(--user-bg);
  box-shadow: 0 2px 8px rgba(99,102,241,0.25);
}

.msg-content { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
.user .msg-content { align-items: flex-end; }

.msg-subject {
  font-size: 10px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 8px; border-radius: 6px;
  display: inline-block;
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px; line-height: 1.7;
}
.bot .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  box-shadow: 0 2px 10px var(--shadow);
}
.user .msg-bubble {
  background: var(--user-bg);
  color: white;
  border-top-right-radius: 4px;
  box-shadow: 0 2px 10px rgba(99,102,241,0.3);
}

/* TYPING */
.typing-dots { display:flex; gap:5px; padding: 4px 2px; }
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%; background: var(--muted);
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }

/* SUGGESTIONS */
.suggestions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.suggestion {
  padding: 7px 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.suggestion:hover {
  background: var(--accent); color: white;
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* INPUT */
.input-area {
  display: flex; gap: 10px; align-items: flex-end;
  padding: 12px 14px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 4px 16px var(--shadow);
  transition: border-color 0.2s;
}
.input-area:focus-within { border-color: var(--accent); }

#userInput {
  flex: 1;
  background: transparent; border: none; outline: none;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 600;
  resize: none; height: 24px; max-height: 100px; line-height: 1.5;
}
#userInput::placeholder { color: var(--muted); font-weight: 400; }

#sendBtn {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 3px 10px rgba(99,102,241,0.35);
}
#sendBtn:hover { opacity: 0.88; }
#sendBtn:active { transform: scale(0.92); }
#sendBtn svg { width: 16px; height: 16px; fill: white; }

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(240,244,255,0.85);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  flex-direction: column; gap: 14px;
}
.loading-spinner {
  width: 42px; height: 42px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { font-size: 14px; font-weight: 700; color: var(--accent); }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">📚</div>
    <div class="header-text">
      <h1>EVO AI</h1>
      <p>Barcha fanlar · O'zbek tilida · Bepul</p>
    </div>
  </div>

  <!-- SUBJECTS BAR -->
  <div class="subjects-bar">
    <div class="sub-chip chip-all active" onclick="setSubject('all',this)">🌟 Hammasi</div>
    <div class="sub-chip chip-math" onclick="setSubject('math',this)">📐 Matematika</div>
    <div class="sub-chip chip-physics" onclick="setSubject('physics',this)">⚡ Fizika</div>
    <div class="sub-chip chip-chem" onclick="setSubject('chem',this)">🧪 Kimyo</div>
    <div class="sub-chip chip-bio" onclick="setSubject('bio',this)">🌿 Biologiya</div>
    <div class="sub-chip chip-history" onclick="setSubject('history',this)">🏛️ Tarix</div>
    <div class="sub-chip chip-lit" onclick="setSubject('lit',this)">📖 Adabiyot</div>
    <div class="sub-chip chip-eng" onclick="setSubject('eng',this)">🇬🇧 Ingliz</div>
    <div class="sub-chip chip-geo" onclick="setSubject('geo',this)">🌍 Geografiya</div>
    <div class="sub-chip chip-it" onclick="setSubject('it',this)">💻 Informatika</div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- SUGGESTIONS -->
  <div class="suggestions" id="suggestions">
    <div class="suggestion" onclick="useSuggestion(this)">📐 Pitagor teoremasi</div>
    <div class="suggestion" onclick="useSuggestion(this)">⚡ Om qonuni nima?</div>
    <div class="suggestion" onclick="useSuggestion(this)">🧪 Kislotalar haqida</div>
    <div class="suggestion" onclick="useSuggestion(this)">🌿 Fotosintez</div>
    <div class="suggestion" onclick="useSuggestion(this)">💻 Algoritm nima?</div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="userInput" placeholder="Savol yozing... (masalan: Pitagor teoremasi nima?)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
let currentSubject = 'all';
let isLoading = false;

const subjectInfo = {
  all:     { label: null, emoji: '🤖' },
  math:    { label: 'Matematika', emoji: '📐', color: '#f59e0b', bg: '#fef3c7' },
  physics: { label: 'Fizika',     emoji: '⚡', color: '#7c3aed', bg: '#ede9fe' },
  chem:    { label: 'Kimyo',      emoji: '🧪', color: '#10b981', bg: '#d1fae5' },
  bio:     { label: 'Biologiya',  emoji: '🌿', color: '#22c55e', bg: '#dcfce7' },
  history: { label: 'Tarix',      emoji: '🏛️', color: '#f97316', bg: '#fff7ed' },
  lit:     { label: 'Adabiyot',   emoji: '📖', color: '#ec4899', bg: '#fce7f3' },
  eng:     { label: 'Ingliz tili',emoji: '🇬🇧', color: '#0ea5e9', bg: '#e0f2fe' },
  geo:     { label: 'Geografiya', emoji: '🌍', color: '#059669', bg: '#ecfdf5' },
  it:      { label: 'Informatika',emoji: '💻', color: '#16a34a', bg: '#f0fdf4' },
};

function setSubject(sub, el) {
  currentSubject = sub;
  document.querySelectorAll('.sub-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  updateSuggestions(sub);
}

const suggestionsBySubject = {
  all:     ['📐 Pitagor teoremasi','⚡ Om qonuni','🧪 Kislotalar','🌿 Fotosintez','💻 Algoritm nima?'],
  math:    ['Pitagor teoremasi','Kvadrat tenglama','Foiz masalalari','Trigonometriya nima?','Logarifm nima?'],
  physics: ['Om qonuni nima?','Nyuton qonunlari','Elektr toki','Mexanik harakat','Issiqlik miqdori'],
  chem:    ['Kislota va asos','Kimyoviy reaksiya','Davriy jadval','Oksidlanish nima?','Valentlik nima?'],
  bio:     ['Fotosintez nima?','Hujayra tuzilishi','DNK nima?','Ovqat hazm qilish','Qon aylanishi'],
  history: ['Temur imperiyasi','Ikkinchi Jahon urushi','Mustaqillik tarixi','Renessans davri','Islom madaniyati'],
  lit:     ['Navoiy hayoti','Cholpon asarlari','Sher tahlili','Badiiy asar','Oybek kimdir?'],
  eng:     ['Present Perfect','Modal verbs','Passive voice','Conditional sentences','Phrasal verbs'],
  geo:     ['Iqlim zonalari','O\'zbekiston tabiati','Tog\' hosil bo\'lishi','Orol dengizi','Aholishunoslik'],
  it:      ['Algoritm nima?','Dasturlash tillari','Internet qanday ishlaydi?','Vektor grafika','Ma\'lumotlar bazasi'],
};

function updateSuggestions(sub) {
  const list = suggestionsBySubject[sub] || suggestionsBySubject.all;
  const container = document.getElementById('suggestions');
  container.innerHTML = list.map(s =>
    `<div class="suggestion" onclick="useSuggestion(this)">${s}</div>`
  ).join('');
}

function useSuggestion(el) {
  document.getElementById('userInput').value = el.textContent.replace(/^[^\w\s]*\s*/,'');
  sendMessage();
}

function addMessage(text, isUser, subject) {
  const msgs = document.getElementById('messages');
  const info = subjectInfo[subject] || subjectInfo.all;
  const div = document.createElement('div');
  div.className = 'message ' + (isUser ? 'user' : 'bot');

  let subjectBadge = '';
  if (!isUser && subject && subject !== 'all' && info.label) {
    subjectBadge = `<div class="msg-subject" style="background:${info.bg};color:${info.color}">${info.emoji} ${info.label}</div>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">${isUser ? '👤' : info.emoji}</div>
    <div class="msg-content">
      ${subjectBadge}
      <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot'; div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content">
      <div class="msg-bubble" style="padding:14px 18px">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function showLoader() {
  const d = document.createElement('div');
  d.className = 'loading-overlay'; d.id = 'loader';
  d.innerHTML = `<div class="loading-spinner"></div><div class="loading-text">AI javob tayyorlamoqda...</div>`;
  document.body.appendChild(d);
}
function hideLoader() {
  const l = document.getElementById('loader');
  if (l) l.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('suggestions').style.display = 'none';
  addMessage(text, true, currentSubject);
  input.value = ''; input.style.height = '24px';
  isLoading = true;
  showTyping();

  const subInfo = subjectInfo[currentSubject];
  const subjectContext = currentSubject !== 'all'
    ? `Fan: ${subInfo.label}. O'zbekiston 8-sinf o'quv dasturi asosida javob ber.`
    : `O'zbekiston 8-sinf o'quv dasturi (matematika, fizika, kimyo, biologiya, tarix, adabiyot, ingliz tili, geografiya, informatika) asosida javob ber.`;

  const systemPrompt = `Sen O'zbekiston 8-sinf o'quvchilariga yordam beradigan AI o'qituvchisan.
${subjectContext}
Qoidalar:
- Har doim o'zbek tilida javob ber
- Oddiy va tushunarli tilda tushuntir
- Misollar va formulalar keltir
- 8-sinf darajasiga mos javob ber
- Qisqa va aniq bo'l (3-6 gap yetarli)
- Agar savol o'quv dasturidan tashqari bo'lsa, muloyimlik bilan ayt`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      addMessage(data.content[0].text, false, currentSubject);
    } else {
      addMessage("Kechirasiz, javob olishda xatolik yuz berdi. Qayta urinib ko'ring! 🙏", false, currentSubject);
    }
  } catch (err) {
    removeTyping();
    addMessage("Internet bilan muammo bor yoki xatolik yuz berdi. Qayta urinib ko'ring! 🔄", false, currentSubject);
  }

  isLoading = false;
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = '24px';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Welcome
setTimeout(() => {
  addMessage("Assalomu alaykum! 👋 Men EVO AI — 8-sinf o'quv yordamchisiman.\n\nQuyidagi fanlar bo'yicha savol bera olasiz:\n📐 Matematika · ⚡ Fizika · 🧪 Kimyo · 🌿 Biologiya\n🏛️ Tarix · 📖 Adabiyot · 🇬🇧 Ingliz · 🌍 Geografiya · 💻 Informatika\n\nYuqoridan fan tanlang yoki savol yozing! 🚀", false, 'all');
}, 300);
</script>
</body>
</html>
